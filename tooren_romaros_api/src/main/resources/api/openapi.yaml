                    type: string
                episode_air_date:
                    type: string
                episode_synopsis:
                    type: string
                episode_photo:
                    type: string
                    format: binary
                episode_runtime:
                    type: string
        Staff:
              type: object
              properties:
                  uuid:
                      type: string
                      pattern: '^[0-9a-fA-F\-]{36}$'
                  staff_first_name:
                      type: string
                  staff_last_name:
                      type: string
                  staff_biography:
                      type: string
                  staff_birthday:
                      type: string
                  staff_profile_photo:
                      type: string
                      format: binary
        Photo:
            type: object

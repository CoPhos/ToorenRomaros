                season_num_episodes:
                    type: string
                season_release_date:
                    type: string
                next_season:
                    type: string
                    pattern: '^[0-9a-fA-F\-]{36}$'
                prev_season:
                    type: string
                    pattern: '^[0-9a-fA-F\-]{36}$'
        Episode:
            type: object
            properties:
                uuid:
                    type: string
                    pattern: '^[0-9a-fA-F\-]{36}$'
                belong_tv_serie:
                    type: string

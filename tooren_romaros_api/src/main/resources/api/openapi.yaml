                uuid:
                    type: string
                    pattern: '^[0-9a-fA-F\-]{36}$'
                belong_film:
                    type: string
                    pattern: '^[0-9a-fA-F\-]{36}$'
                appears_staff:
                    type: array
                    items:
                        type: string
                        pattern: '^[0-9a-fA-F\-]{36}$'
                photo:
                    type: string
                    format: binary
        Video:
            type: object
            properties:
                uuid:
                    type: string
                    pattern: '^[0-9a-fA-F\-]{36}$'
                belong_film:
                    type: string
                    pattern: '^[0-9a-fA-F\-]{36}$'
                video:

                    type: string
                post_discuss_count:
                    type: integer
                post_like_count:
                    type: integer
                post_body:
                    type: string
                post_tittle:
                    type: string
        Discuss:
            type: object
            properties:
                uuid:
                    type: string
                    pattern: '^[0-9a-fA-F\-]{36}$'
                publish_user_id:
                    type: string
                    pattern: '^[0-9a-fA-F\-]{36}$'
                belong_post_id:
                    type: string
                    pattern: '^[0-9a-fA-F\-]{36}$'
                discuss_like_count:
                    type: integer
                discuss_body:
                    type: string
                discuss_tittle:
                    type: string
        Movie:
              type: object
              properties:
                  release_theaters_date:
                      type: string
                  release_streaming_date:
                      type: string
                  box_office:
                      type: string
                  at_teather:
                      type: boolean
                  at_streaming:
                      type: boolean
                  sequel:
                      type: string
                      pattern: '^[0-9a-fA-F\-]{36}$'
                  prequel:
                      type: string
                      pattern: '^[0-9a-fA-F\-]{36}$'
                  available_streamsite:
                            type: array
                            items:
                              type: string
                              pattern: '^[0-9a-fA-F\-]{36}$'
        TvSerie:
              type: object
              properties:
                  release_streaming_date:
                      type: string
                  at_streaming:
                      type: boolean
                  available_streamsite:
                            type: array
                            items:
                              type: string
                              pattern: '^[0-9a-fA-F\-]{36}$'
        Film:
            allOf:
                - type: object
                  properties:
                        uuid:
                            type: string
                            pattern: '^[0-9a-fA-F\-]{36}$'
                        tittle:
                            type: string
                        synopsis:
                            type: string
                        original_langueage:
                            type: string
                        runtime:
                            type: string
                        distributor:
                            type: string
                        photo:
                            type: string
                            format: binary
                        trailer:
                            type: string
                            format: binary
                        publish_date:
                            type: string
                        suitable_for:
                            type: string
                        user_view:
                            type: integer
                        critic_review:
                            type: integer
                        audience_review:
                            type: integer
                        average_critic_review:
                            type: number
                            format: float
                            minimum: 0
                            exclusiveMaximum: true
                            maximum: 101
                        average_audience_review:
                            type: number
                            format: float
                            minimum: 0
                            exclusiveMaximum: true
                            maximum: 101
                        has_genres:
                            type: array
                            items:
                              type: string
                              pattern: '^[0-9a-fA-F\-]{36}$'
                        takepart_staff:
                            type: array
                            items:
                              type: string
                              pattern: '^[0-9a-fA-F\-]{36}$'
                - oneOf:
                    - $ref: '#/components/schemas/Movie'
                    - $ref: '#/components/schemas/TvSerie'
        Season:
            type: object
            properties:
                uuid:
                    type: string
                    pattern: '^[0-9a-fA-F\-]{36}$'
                belong_film:
                    type: string
                    pattern: '^[0-9a-fA-F\-]{36}$'
                season_number:
                    type: string
